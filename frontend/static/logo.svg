<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 深邃蓝背景 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A2540"/>
      <stop offset="100%" stop-color="#0F1720"/>
    </linearGradient>
  </defs>

  <!-- 超圆角矩形背景 -->
  <rect x="48" y="48" width="416" height="416" rx="128" fill="url(#bg)"/>

  <!-- 主图形：放大镜 + 文件索引 -->
  <g transform="translate(256, 256)" fill="none" stroke="#FFFFFF" stroke-linecap="round">
    <!-- 不完整圆环：搜索范围 -->
    <path d="M 0,-120 A 120,120 0 1,1 -100,60" stroke-width="28"/>

    <!-- 文件索引线：三条横线 -->
    <line x1="-60" y1="-40" x2="40" y2="-40" stroke-width="20"/>
    <line x1="-60" y1="0" x2="20" y2="0" stroke-width="20"/>
    <line x1="-60" y1="40" x2="40" y2="40" stroke-width="20"/>

    <!-- 放大镜手柄 -->
    <line x1="85" y1="85" x2="130" y2="130" stroke-width="28" stroke="#00D4AA"/>
  </g>

  <!-- 品牌识别点 -->
  <circle cx="400" cy="400" r="20" fill="#00D4AA"/>
</svg>