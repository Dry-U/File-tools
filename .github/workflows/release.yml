name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          $VERSION = $env:GITHUB_REF -replace 'refs/tags/v', ''
          echo "VERSION=$VERSION" >> $env:GITHUB_OUTPUT
          echo "Setting version to: $VERSION"

      - name: Update VERSION file
        run: |
          $VERSION = "${{ steps.version.outputs.VERSION }}"
          Set-Content -Path VERSION -Value $VERSION
          Get-Content VERSION

      - name: Sync version to all files
        run: |
          python scripts/sync_version.py

      - name: Commit version updates
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add VERSION pyproject.toml build_nuitka.py scripts/build_inno_setup.iss
          git commit -m "chore: bump version to ${{ steps.version.outputs.VERSION }}" || echo "No changes to commit"
          git push || echo "Push skipped (no changes)"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Build with Nuitka
        run: python build_nuitka.py slim

      - name: Build installer with Inno Setup
        run: |
          $VERSION = "${{ steps.version.outputs.VERSION }}"
          iscc "scripts/build_inno_setup.iss"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: FileTools-${{ steps.version.outputs.VERSION }}-win64-setup
          path: dist/installer/*.exe
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/installer/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
