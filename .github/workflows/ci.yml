name: CI/CD (Nuitka)

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - cpu
          - gpu
          - slim

env:
  PYTHONUNBUFFERED: 1
  UV_SYSTEM_PYTHON: 1

jobs:
  # ==================== 代码质量检查 ====================
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Lint with ruff
        run: |
          uvx ruff check backend/ tests/ --output-format=github
        continue-on-error: false

      - name: Format check with black
        run: |
          uvx black --check backend/ tests/
        continue-on-error: false

      - name: Type check with basedpyright
        run: |
          uvx basedpyright backend/ tests/
        continue-on-error: false

  # ==================== 单元测试 ====================
  test:
    name: Unit Tests (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Run tests with coverage
        run: |
          uv run pytest tests/unit/ -v --cov=backend --cov-report=xml --cov-report=term --tb=short

      - name: Run integration tests
        run: |
          uv run pytest tests/integration/ -v --tb=short

      - name: Run API tests
        run: |
          uv run pytest tests/api/ -v --tb=short

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  # ==================== 无障碍测试 ====================
  accessibility-test:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Playwright
        run: |
          npm install -g playwright

      - name: Start server
        run: |
          # Start server in background with mocked native libs
          uv run python -c "
          import sys
          from unittest.mock import MagicMock
          sys.modules['tantivy'] = MagicMock()
          sys.modules['hnswlib'] = MagicMock()
          import uvicorn
          uvicorn.run('backend.api.main:app', host='127.0.0.1', port=8000)
          " &
          APP_PID=$!
          echo "APP_PID=$APP_PID" >> $GITHUB_ENV
          trap "kill $APP_PID 2>/dev/null" EXIT

          echo "Waiting for server to start..."
          for i in $(seq 1 60); do
            if curl -s http://127.0.0.1:8000/api/health > /dev/null 2>&1; then
              echo "Server is ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run accessibility tests
        run: |
          uv run pytest tests/e2e/test_accessibility.py -v --tb=short || true

  # ==================== 冒烟测试 ====================
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Smoke test
        run: |
          # Start server in background with mocked native libs (CI runners lack AVX-512)
          uv run python -c "
          import sys
          from unittest.mock import MagicMock
          sys.modules['tantivy'] = MagicMock()
          sys.modules['hnswlib'] = MagicMock()
          import uvicorn
          uvicorn.run('backend.api.main:app', host='127.0.0.1', port=8000)
          " &
          APP_PID=$!
          trap "kill $APP_PID 2>/dev/null" EXIT

          echo "Waiting for server to start..."
          for i in $(seq 1 120); do
            if curl -s http://127.0.0.1:8000/api/health > /dev/null 2>&1; then
              echo "Server is ready after ${i}s"
              break
            fi
            sleep 1
          done

          # Health check
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/api/health)
          echo "Health endpoint returned HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Health check failed (HTTP $HTTP_CODE)"
            curl -s http://127.0.0.1:8000/api/health
            exit 1
          fi
          echo "Health check passed"

          # Search endpoint test
          HTTP_CODE=$(curl -s -o /tmp/search_result.json -w "%{http_code}" -X POST http://127.0.0.1:8000/api/search \
            -H "Content-Type: application/json" \
            -d '{"query":"test"}')
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "Search endpoint OK (HTTP 200)"
          else
            echo "Search endpoint returned HTTP $HTTP_CODE"
          fi

  # ==================== 安全检查 ====================
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Run Bandit security checks
        run: |
          uvx bandit -r backend/ -ll || true

      - name: Run safety check
        run: |
          uvx safety check --json || true

  # ==================== Nuitka 打包构建 ====================
  build:
    name: Build ${{ matrix.build_mode }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows: 构建所有版本
          - os: windows-latest
            build_mode: cpu
            deps: "ai"
          - os: windows-latest
            build_mode: gpu
            deps: "ai"
          - os: windows-latest
            build_mode: slim
            deps: ""
          # Linux: 仅构建 slim 版本（AI 版本超过 2GB GitHub 限制）
          - os: ubuntu-latest
            build_mode: slim
            deps: ""

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: |
            build/
            ~/.cache/nuitka/
          key: nuitka-${{ runner.os }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            nuitka-${{ runner.os }}-

      - name: Install build dependencies
        shell: bash
        run: |
          uv pip install nuitka
          uv pip install -e "."
          DEPS="${{ matrix.deps }}"
          if [ -n "$DEPS" ]; then
            uv pip install -e ".[${DEPS}]"
          fi

      - name: Resolve build version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            APP_VERSION="${GITHUB_REF_NAME#v}"
            echo "Using tag version: ${APP_VERSION}"
          else
            CURRENT_VERSION=$(cat VERSION 2>/dev/null || echo "1.0.0")
            echo "Using version: ${CURRENT_VERSION}"
            APP_VERSION="${CURRENT_VERSION}"
          fi
          echo "FILETOOLS_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"
          echo "FILETOOLS_BUILD_MODE=${{ matrix.build_mode }}" >> "$GITHUB_ENV"

      - name: Build executable with Nuitka (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          export FILETOOLS_VERSION="$FILETOOLS_VERSION"
          export FILETOOLS_BUILD_MODE="$FILETOOLS_BUILD_MODE"
          python build_nuitka.py %BUILD_MODE%

      - name: Build executable with Nuitka (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          export FILETOOLS_VERSION=${FILETOOLS_VERSION}
          export FILETOOLS_BUILD_MODE=${FILETOOLS_BUILD_MODE}
          python build_nuitka.py $BUILD_MODE

      - name: Analyze build size
        run: |
          echo "=== Build artifacts size ==="
          du -sh dist/*/ 2>/dev/null || echo "No dist directories found"
          echo ""
          echo "=== Largest files (top 20) ==="
          find dist -type f -exec ls -lh {} \; 2>/dev/null | sort -k5 -rh | head -20 || echo "No files found"
          echo ""
          echo "=== File count by extension ==="
          find dist -type f -name "*.dll" 2>/dev/null | wc -l | xargs echo "DLL count:"
          find dist -type f -name "*.pyd" 2>/dev/null | wc -l | xargs echo "PYD count:"

      - name: Clean up build output
        shell: bash
        run: |
          # Remove any .py source files that may have been included
          find dist -name "*.py" -type f -delete 2>/dev/null || true
          # Remove __pycache__ directories
          find dist -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          echo "Build output cleaned"

      - name: Verify build output (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          if [ -f "dist/main.dist/main.exe" ]; then
            echo "main.exe found"
            ls -la dist/main.dist/
          else
            echo "ERROR: main.exe not found"
            ls -la dist/ 2>/dev/null || echo "dist not found"
            exit 1
          fi

      - name: Install Inno Setup (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          # Download Inno Setup directly
          INNO_URL="https://jrsoftware.org/download.php/is.exe"
          curl -L -o is.exe "$INNO_URL"
          # Install silently
          ./is.exe /VERYSILENT /SUPPRESSMSGBOXES /NORESTART /SP-
          # Find Inno Setup installation
          if [ -f "C:/Program Files (x86)/Inno Setup 6/ISCC.exe" ]; then
            echo "C:/Program Files (x86)/Inno Setup 6/ISCC.exe" >> $GITHUB_PATH
          elif [ -f "C:/Program Files/Inno Setup 6/ISCC.exe" ]; then
            echo "C:/Program Files/Inno Setup 6/ISCC.exe" >> $GITHUB_PATH
          fi

      - name: Create Inno Setup installer (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          FILETOOLS_VERSION: ${{ env.FILETOOLS_VERSION }}
          FILETOOLS_BUILD_MODE: ${{ env.FILETOOLS_BUILD_MODE }}
        run: |
          mkdir -p dist/installer
          iscc scripts/build_inno_setup.iss
          if [ -f "dist/installer/FileTools-${FILETOOLS_VERSION}-win64-setup.exe" ]; then
            echo "Installer created successfully"
          else
            echo "ERROR: Installer creation failed"
            ls -la dist/installer/
            exit 1
          fi

      - name: Create portable zip (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          FILETOOLS_VERSION: ${{ env.FILETOOLS_VERSION }}
          FILETOOLS_BUILD_MODE: ${{ env.FILETOOLS_BUILD_MODE }}
        run: |
          PACKAGE_NAME="filetools_${FILETOOLS_VERSION}_${{ matrix.build_mode }}_windows_amd64_portable.zip"
          7z a "dist/${PACKAGE_NAME}" "dist/main.dist"
          echo "Created: dist/${PACKAGE_NAME}"

      - name: Create tar.gz archive (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          FILETOOLS_VERSION: ${{ env.FILETOOLS_VERSION }}
          FILETOOLS_BUILD_MODE: ${{ env.FILETOOLS_BUILD_MODE }}
        run: |
          PACKAGE_NAME="filetools_${FILETOOLS_VERSION}_${{ matrix.build_mode }}_linux_amd64_portable.tar.gz"
          tar -czf "dist/${PACKAGE_NAME}" -C dist main.dist
          echo "Created: dist/${PACKAGE_NAME}"

      - name: Clean up build directories
        shell: bash
        run: |
          # Remove Nuitka build directory
          rm -rf build/
          # Remove unpacked application directory (keep only final packages)
          rm -rf dist/main.dist/
          echo "Cleaned up build intermediates"
          ls -la dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: file-tools-${{ matrix.build_mode }}-${{ matrix.os }}-v${{ env.FILETOOLS_VERSION }}
          path: |
            dist/*_setup.exe
            dist/*_portable.zip
            dist/*_portable.tar.gz
          if-no-files-found: warn
          retention-days: 30

  # ==================== 发布 ====================
  release:
    name: Publish Release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Display structure of downloaded files
        run: |
          ls -R release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*_setup.exe
            release-artifacts/**/*_portable.zip
            release-artifacts/**/*_portable.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## FileTools ${{ github.ref_name }}

            ### 更新日志
            查看完整变更日志: https://github.com/${{ github.repository }}/compare/v1.0.10...${{ github.ref_name }}

            ### 版本说明

            | 版本 | 说明 | 体积 | 适用场景 |
            |------|------|------|----------|
            | **Slim** | 文件搜索，无 AI | ~100 MB | 轻量使用，仅需搜索功能 |
            | **CPU** | 完整 AI，CPU 推理 | ~260 MB | 无 GPU 电脑，需要 AI 问答 |
            | **GPU** | 完整 AI，CUDA 加速 | ~260 MB | NVIDIA 显卡，需要 GPU 加速 |

            ### 下载说明

            #### 📦 命名规则
            ```
            filetools_{版本号}_{模式}_{平台}_{架构}_{类型}.{扩展名}
            ```

            #### 🪟 Windows (x64, 64位)
            | 文件名 | 大小 | 类型 | 说明 |
            |--------|------|------|------|
            | `filetools_1.1.0_slim_windows_amd64_setup.exe` | ~100 MB | 安装程序 | 推荐：自动安装，带卸载 |
            | `filetools_1.1.0_cpu_windows_amd64_setup.exe` | ~260 MB | 安装程序 | AI 功能，纯 CPU |
            | `filetools_1.1.0_gpu_windows_amd64_setup.exe` | ~260 MB | 安装程序 | AI 功能，CUDA 加速 |
            | `filetools_1.1.0_*_windows_amd64_portable.zip` | 同左 | 便携版 | 解压即用，不写注册表 |

            #### 🐧 Linux (x64, 64位, Ubuntu/Debian)
            | 文件名 | 大小 | 说明 |
            |--------|------|------|
            | `filetools_1.1.0_slim_linux_amd64_portable.tar.gz` | ~128 MB | 便携版，解压即用 |

            ### 快速开始

            **Windows**
            1. 下载对应版本的 `*_setup.exe` 或 `*_portable.zip`
            2. 运行安装程序或解压后双击 `main.exe`
            3. 浏览器自动打开 http://127.0.0.1:8000

            **Linux**
            ```bash
            tar -xzf filetools_1.1.0_slim_linux_amd64_portable.tar.gz
            cd filetools_1.1.0_slim_linux_amd64/
            ./main
            ```

            ### 系统要求
            - **Windows**: Windows 10/11 64位
            - **Linux**: Ubuntu 20.04+ / Debian 11+ (64位)
            - **GPU 版本**: NVIDIA 显卡 + CUDA 驱动 11.8+
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==================== 版本号自动提交 ====================
  version-bump:
    name: Bump Version (if needed)
    needs: [build]
    if: github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        run: |
          CURRENT_VERSION=$(cat VERSION 2>/dev/null || echo "1.0.0")
          MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
          MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
          PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          APP_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo $APP_VERSION > VERSION
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add VERSION
          git commit -m "chore: bump version to ${APP_VERSION}" || echo "No changes to commit"
          git push
