name: CI/CD (PyInstaller + Tauri)

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - debug
          - release

env:
  PYTHONUNBUFFERED: 1
  UV_SYSTEM_PYTHON: 1

jobs:
  # ==================== 代码质量检查 ====================
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Lint with ruff
        run: |
          uvx ruff check backend/ tests/ --output-format=github
        continue-on-error: false

      - name: Format check with ruff
        run: |
          uvx ruff format --check backend/ tests/
        continue-on-error: false

  # ==================== 单元测试 ====================
  test:
    name: Unit Tests (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Run tests with coverage
        run: |
          uv run pytest tests/unit/ -v --cov=backend --cov-report=xml --cov-report=term --tb=short

      - name: Run integration tests
        run: |
          uv run pytest tests/integration/ -v --tb=short

      - name: Run API tests
        run: |
          uv run pytest tests/api/ -v --tb=short

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  # ==================== 安全检查 ====================
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Run Bandit security checks
        run: |
          uvx bandit -r backend/ -ll

      - name: Run safety check
        run: |
          uvx safety check --json

  # ==================== Tauri 构建 (Windows) ====================
  build-tauri-windows:
    name: Build Tauri (Windows)
    runs-on: windows-latest
    timeout-minutes: 180
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: |
          uv sync

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Tauri CLI
        run: |
          npm install -g @tauri-apps/cli@latest

      - name: Resolve version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            APP_VERSION="${GITHUB_REF_NAME#v}"
          else
            APP_VERSION=$(cat VERSION 2>/dev/null || echo "1.0.0")
          fi
          echo "FILETOOLS_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"
          echo "App version: ${APP_VERSION}"

      - name: Build Python backend with PyInstaller
        run: |
          python build_pyinstaller.py
        env:
          FILETOOLS_VERSION: ${{ env.FILETOOLS_VERSION }}

      - name: Verify backend binary
        shell: bash
        run: |
          if [ -f "src-tauri/bin/filetools-backend.exe" ]; then
            echo "Backend binary found"
            ls -la src-tauri/bin/
          else
            echo "ERROR: Backend binary not found"
            exit 1
          fi

      - name: Build Tauri application
        run: |
          $env:PATH = 'C:\Users\20840\.cargo\bin;' + $env:PATH
          npm run tauri:build -- --bundles nsis,msi
        env:
          FILETOOLS_VERSION: ${{ env.FILETOOLS_VERSION }}

      - name: Display build artifacts
        run: |
          echo "=== Build artifacts ==="
          Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -File | ForEach-Object {
            Write-Host "$($_.Directory.Name)/$($_.Name) - $([math]::Round($_.Length / 1MB, 2)) MB"
          }

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: filetools-windows-installers-v${{ env.FILETOOLS_VERSION }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn
          retention-days: 30

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: filetools-windows-portable-v${{ env.FILETOOLS_VERSION }}
          path: src-tauri/target/release/*.exe
          if-no-files-found: warn
          retention-days: 30

  # ==================== Tauri 构建 (Linux) ====================
  build-tauri-linux:
    name: Build Tauri (Linux)
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            python3-venv

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: |
          uv sync

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Tauri CLI
        run: |
          npm install -g @tauri-apps/cli@latest

      - name: Resolve version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            APP_VERSION="${GITHUB_REF_NAME#v}"
          else
            APP_VERSION=$(cat VERSION 2>/dev/null || echo "1.0.0")
          fi
          echo "FILETOOLS_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"

      - name: Build Python backend with PyInstaller
        run: |
          python build_pyinstaller.py

      - name: Build Tauri application
        run: |
          npm run tauri:build -- --bundles deb,appimage
        env:
          FILETOOLS_VERSION: ${{ env.FILETOOLS_VERSION }}

      - name: Display build artifacts
        run: |
          echo "=== Build artifacts ==="
          find src-tauri/target/release/bundle -type f -name "*.deb" -o -name "*.AppImage" | while read f; do
            echo "$f - $(du -h "$f" | cut -f1)"
          done

      - name: Upload Linux installers
        uses: actions/upload-artifact@v4
        with:
          name: filetools-linux-installers-v${{ env.FILETOOLS_VERSION }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
          retention-days: 30

  # ==================== Tauri 构建 (macOS) ====================
  build-tauri-macos:
    name: Build Tauri (macOS)
    runs-on: macos-14
    timeout-minutes: 180
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: |
          uv sync

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Tauri CLI
        run: |
          npm install -g @tauri-apps/cli@latest

      - name: Resolve version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            APP_VERSION="${GITHUB_REF_NAME#v}"
          else
            APP_VERSION=$(cat VERSION 2>/dev/null || echo "1.0.0")
          fi
          echo "FILETOOLS_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"

      - name: Build Python backend with PyInstaller
        run: |
          python build_pyinstaller.py

      - name: Build Tauri application
        run: |
          npm run tauri:build -- --bundles dmg
        env:
          FILETOOLS_VERSION: ${{ env.FILETOOLS_VERSION }}

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: filetools-macos-dmg-v${{ env.FILETOOLS_VERSION }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn
          retention-days: 30

  # ==================== 发布 ====================
  release:
    name: Publish Release
    needs: [build-tauri-windows, build-tauri-linux, build-tauri-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Display artifacts
        run: |
          echo "=== All artifacts ==="
          find release-artifacts -type f | while read f; do
            echo "$f - $(du -h "$f" | cut -f1)"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## FileTools ${{ github.ref_name }}

            ### 下载说明

            | 平台 | 文件类型 | 说明 |
            |------|----------|------|
            | Windows | NSIS (.exe) | 安装程序 - 推荐 Windows 用户 |
            | Windows | MSI (.msi) | Microsoft Installer - 企业部署 |
            | Linux | DEB (.deb) | Debian/Ubuntu 包 |
            | Linux | AppImage (.AppImage) | 通用 Linux 包 |
            | macOS | DMG (.dmg) | macOS 安装包 |

            ### 安装要求

            - **Windows**: Windows 10/11 64位
            - **Linux**: Ubuntu 20.04+ / Debian 11+ (64位)
            - **macOS**: macOS 10.15+ (Apple Silicon 或 Intel)

            ### 快速开始

            1. 下载对应平台的安装包
            2. 运行安装程序或解压 AppImage
            3. 启动 FileTools，浏览器将自动打开
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==================== 版本号自动提交 ====================
  version-bump:
    name: Bump Version (if needed)
    needs: [build-tauri-windows]
    if: github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        run: |
          CURRENT_VERSION=$(cat VERSION 2>/dev/null || echo "1.0.0")
          MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
          MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
          PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          APP_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo $APP_VERSION > VERSION
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add VERSION
          git commit -m "chore: bump version to ${APP_VERSION}" || echo "No changes to commit"
          git push
