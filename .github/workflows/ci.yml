name: CI/CD

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - cpu
          - gpu
          - slim

env:
  PYTHONUNBUFFERED: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ==================== 代码质量检查 ====================
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black basedpyright bandit

      - name: Lint with ruff
        run: |
          ruff check backend/ tests/ --output-format=github
        continue-on-error: false

      - name: Format check with black
        run: |
          black --check backend/ tests/
        continue-on-error: false

      - name: Type check with basedpyright
        run: |
          basedpyright backend/ tests/
        continue-on-error: false

  # ==================== 单元测试 ====================
  test:
    name: Unit Tests (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/unit/ -v --cov=backend --cov-report=xml --cov-report=term --tb=short

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  # ==================== 冒烟测试 ====================
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "."

      - name: Smoke test
        run: |
          # Start server in background with mocked native libs (CI runners lack AVX-512)
          python -c "
          import sys
          from unittest.mock import MagicMock
          sys.modules['tantivy'] = MagicMock()
          sys.modules['hnswlib'] = MagicMock()
          import uvicorn
          uvicorn.run('backend.api.main:app', host='127.0.0.1', port=8000)
          " &
          APP_PID=$!
          trap "kill $APP_PID 2>/dev/null" EXIT

          echo "Waiting for server to start..."
          for i in $(seq 1 120); do
            if curl -s http://127.0.0.1:8000/api/health/ready > /dev/null 2>&1; then
              echo "Server is ready after ${i}s"
              break
            fi
            sleep 1
          done

          # Health check
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/api/health)
          echo "Health endpoint returned HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Health check failed (HTTP $HTTP_CODE)"
            curl -s http://127.0.0.1:8000/api/health
            exit 1
          fi
          echo "Health check passed"

          # Search endpoint test
          HTTP_CODE=$(curl -s -o /tmp/search_result.json -w "%{http_code}" -X POST http://127.0.0.1:8000/api/search \
            -H "Content-Type: application/json" \
            -d '{"query":"test"}')
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "Search endpoint OK (HTTP 200)"
          else
            echo "Search endpoint returned HTTP $HTTP_CODE"
          fi

  # ==================== 安全检查 ====================
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install bandit safety

      - name: Run Bandit security checks
        run: |
          bandit -r backend/ -ll || true

      - name: Run safety check
        run: |
          safety check --json || true

  # ==================== 打包构建 ====================
  build:
    name: Build ${{ matrix.build_mode }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_mode: [cpu, gpu, slim]
        include:
          # CPU 版本依赖
          - build_mode: cpu
            deps: "ai-cpu"
          # GPU 版本依赖
          - build_mode: gpu
            deps: "ai-gpu"
          # Slim 版本依赖
          - build_mode: slim
            deps: ""

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e ".[dev]"
          DEPS="${{ matrix.deps }}"
          if [ -n "$DEPS" ]; then
            pip install -e ".[${DEPS}]"
          fi

      - name: Resolve build version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            APP_VERSION="${GITHUB_REF_NAME#v}"
            echo "Using tag version: ${APP_VERSION}"
          else
            CURRENT_VERSION=$(cat VERSION 2>/dev/null || echo "1.0.0")
            echo "Using version: ${CURRENT_VERSION}"
            APP_VERSION="${CURRENT_VERSION}"
          fi
          echo "FILETOOLS_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"
          echo "FILETOOLS_BUILD_MODE=${{ matrix.build_mode }}" >> "$GITHUB_ENV"

      - name: Build executable (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          export FILETOOLS_VERSION="$FILETOOLS_VERSION"
          export FILETOOLS_BUILD_MODE="$FILETOOLS_BUILD_MODE"
          pyinstaller file-tools.spec --noconfirm --clean

      - name: Build executable (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          export FILETOOLS_VERSION=${FILETOOLS_VERSION}
          export FILETOOLS_BUILD_MODE=${FILETOOLS_BUILD_MODE}
          pyinstaller file-tools.spec --noconfirm --clean

      - name: Clean up build output
        shell: bash
        run: |
          # Remove any .py source files that may have been included
          find dist -name "*.py" -type f -delete 2>/dev/null || true
          # Remove __pycache__ directories
          find dist -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          echo "Build output cleaned"

      - name: Verify build output (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          ARCHIVE_DIR="FileTools-v${FILETOOLS_VERSION}-${{ matrix.build_mode }}"
          if [ -f "dist/${ARCHIVE_DIR}/FileTools.exe" ]; then
            echo "FileTools.exe found"
          else
            echo "ERROR: FileTools.exe not found"
            ls -la "dist/${ARCHIVE_DIR}/" 2>/dev/null || echo "Directory not found"
            exit 1
          fi
          # Check python311.dll exists
          if [ -f "dist/${ARCHIVE_DIR}/FileTools.exe" ]; then
            echo "Build output OK"
          fi

      - name: Verify build output (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          ARCHIVE_DIR="FileTools-v${FILETOOLS_VERSION}-${{ matrix.build_mode }}"
          if [ -f "dist/${ARCHIVE_DIR}/FileTools" ]; then
            echo "FileTools binary found"
            chmod +x "dist/${ARCHIVE_DIR}/FileTools"
            echo "Build output OK"
          else
            echo "ERROR: FileTools binary not found"
            ls -la "dist/${ARCHIVE_DIR}/" 2>/dev/null || echo "Directory not found"
            exit 1
          fi

      - name: Create NSIS installer (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          FILETOOLS_VERSION: ${{ env.FILETOOLS_VERSION }}
          FILETOOLS_BUILD_MODE: ${{ env.FILETOOLS_BUILD_MODE }}
        run: |
          # Install NSIS via Chocolatey
          choco install nsis -y --no-progress
          # Generate NSIS script and build installer
          python scripts/build_installer.py \
            --mode "${{ matrix.build_mode }}" \
            --version "${FILETOOLS_VERSION}"

      - name: Create portable zip (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          FILETOOLS_VERSION: ${{ env.FILETOOLS_VERSION }}
          FILETOOLS_BUILD_MODE: ${{ env.FILETOOLS_BUILD_MODE }}
        run: |
          ARCHIVE_DIR="FileTools-v${FILETOOLS_VERSION}-${{ matrix.build_mode }}"
          PACKAGE_NAME="FileTools-${{ matrix.build_mode }}-v${FILETOOLS_VERSION}-windows-x64-portable.zip"
          7z a "dist/${PACKAGE_NAME}" "dist/${ARCHIVE_DIR}"
          echo "Created: dist/${PACKAGE_NAME}"

      - name: Create .deb package (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          FILETOOLS_VERSION: ${{ env.FILETOOLS_VERSION }}
          FILETOOLS_BUILD_MODE: ${{ env.FILETOOLS_BUILD_MODE }}
        run: |
          ARCHIVE_DIR="FileTools-v${FILETOOLS_VERSION}-${{ matrix.build_mode }}"
          DEB_NAME="filetools-${{ matrix.build_mode }}"
          DEB_VERSION="${FILETOOLS_VERSION}"
          DEB_ARCH="amd64"
          DEB_PKG="${DEB_NAME}_${DEB_VERSION}_${DEB_ARCH}.deb"

          PKG_ROOT="debbuild/${DEB_PKG}"
          mkdir -p "${PKG_ROOT}/DEBIAN"
          mkdir -p "${PKG_ROOT}/opt/filetools"
          mkdir -p "${PKG_ROOT}/usr/share/applications"
          mkdir -p "${PKG_ROOT}/usr/local/bin"

          # Copy build output
          cp -r "dist/${ARCHIVE_DIR}/"* "${PKG_ROOT}/opt/filetools/"

          # Control file (no leading spaces - dpkg requires it)
          printf '%s\n' \
            "Package: filetools-${{ matrix.build_mode }}" \
            "Version: ${FILETOOLS_VERSION}" \
            "Architecture: amd64" \
            "Maintainer: Darian <dry-u@users.noreply.github.com>" \
            "Description: FileTools (${{ matrix.build_mode }} edition) - Intelligent file search and RAG system" \
            " A hybrid file retrieval and RAG system with dual-engine search," \
            " supporting text (BM25) and vector (HNSW) search." \
            "Section: utils" \
            "Priority: optional" \
            > "${PKG_ROOT}/DEBIAN/control"

          # Post-install script
          printf '%s\n' \
            '#!/bin/bash' \
            'chmod +x /opt/filetools/FileTools' \
            'ln -sf /opt/filetools/FileTools /usr/local/bin/filetools 2>/dev/null || true' \
            > "${PKG_ROOT}/DEBIAN/postinst"
          chmod 755 "${PKG_ROOT}/DEBIAN/postinst"

          # Pre-remove script
          printf '%s\n' \
            '#!/bin/bash' \
            'rm -f /usr/local/bin/filetools 2>/dev/null || true' \
            > "${PKG_ROOT}/DEBIAN/prerm"
          chmod 755 "${PKG_ROOT}/DEBIAN/prerm"

          # Desktop entry
          printf '%s\n' \
            '[Desktop Entry]' \
            'Name=FileTools' \
            'Comment=Intelligent file search and RAG system' \
            'Exec=/opt/filetools/FileTools' \
            'Icon=filetools' \
            'Terminal=false' \
            'Type=Application' \
            'Categories=Utility;FileTools;' \
            > "${PKG_ROOT}/usr/share/applications/filetools.desktop"

          # Build .deb
          dpkg-deb --build --root-owner-group "${PKG_ROOT}"
          mv "debbuild/${DEB_PKG}" "dist/${DEB_PKG}"
          # Clean up intermediate deb build directory
          rm -rf debbuild
          echo "Created: dist/${DEB_PKG}"

      - name: Create tar.gz archive (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          FILETOOLS_VERSION: ${{ env.FILETOOLS_VERSION }}
          FILETOOLS_BUILD_MODE: ${{ env.FILETOOLS_BUILD_MODE }}
        run: |
          ARCHIVE_DIR="FileTools-v${FILETOOLS_VERSION}-${{ matrix.build_mode }}"
          PACKAGE_NAME="FileTools-${{ matrix.build_mode }}-v${FILETOOLS_VERSION}-linux-x64-portable.tar.gz"
          tar -czf "dist/${PACKAGE_NAME}" -C dist "${ARCHIVE_DIR}"
          echo "Created: dist/${PACKAGE_NAME}"

      - name: Clean up PyInstaller build directories
        shell: bash
        run: |
          # Remove PyInstaller output dirs - only keep final packages
          rm -rf dist/FileTools-v*
          # Remove generated NSIS scripts
          rm -f installer-*.nsi
          echo "Cleaned up build intermediates"
          ls -la dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: file-tools-${{ matrix.build_mode }}-${{ matrix.os }}-v${{ env.FILETOOLS_VERSION }}
          path: |
            dist/*.zip
            dist/*.exe
            dist/*.tar.gz
            dist/*.deb
          if-no-files-found: warn
          retention-days: 30

  # ==================== 发布 ====================
  release:
    name: Publish Release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Display structure of downloaded files
        run: |
          ls -R release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
          fail-on-error: false
          body: |
            ## FileTools v${{ github.ref_name }}

            ### 版本说明

            | 版本 | 说明 | 适用场景 |
            |------|------|----------|
            | **Slim** | 最小化版本，仅文件搜索 | 轻量使用，无 AI 需求 |
            | **CPU** | 完整 AI 功能，纯 CPU 推理 | 无 GPU 的普通电脑 |
            | **GPU** | 完整 AI 功能，CUDA 加速 | 有 NVIDIA GPU 的环境 |

            ### 下载文件说明

            #### Windows (x64)
            | 文件名格式 | 类型 | 说明 |
            |------------|------|------|
            | `FileTools-slim-v*-Setup.exe` | 安装程序 | NSIS 安装包，双击安装 |
            | `FileTools-cpu-v*-Setup.exe` | 安装程序 | NSIS 安装包，双击安装 |
            | `FileTools-gpu-v*-Setup.exe` | 安装程序 | NSIS 安装包，双击安装 |
            | `FileTools-*-v*-windows-x64-portable.zip` | 便携版 | 解压即用，无需安装 |

            安装程序会自动安装到 `C:\Program Files\FileTools\`，创建桌面快捷方式和开始菜单，支持控制面板卸载。

            #### Linux (x64, Ubuntu/Debian)
            | 文件名格式 | 类型 | 说明 |
            |------------|------|------|
            | `filetools-slim_*_amd64.deb` | 安装包 | `sudo dpkg -i filetools-slim_*_amd64.deb` |
            | `filetools-cpu_*_amd64.deb` | 安装包 | `sudo dpkg -i filetools-cpu_*_amd64.deb` |
            | `filetools-gpu_*_amd64.deb` | 安装包 | `sudo dpkg -i filetools-gpu_*_amd64.deb` |
            | `FileTools-*-v*-linux-x64-portable.tar.gz` | 便携版 | `tar -xzf *.tar.gz && cd FileTools-* && ./FileTools` |

            .deb 安装到 `/opt/filetools/`，创建 `filetools` 命令行入口和桌面快捷方式。

            > `_internal/` 文件夹包含 Python 运行时依赖，请勿删除。这是正常结构。

            ### 快速开始

            1. 下载对应平台和版本的安装包
            2. Windows: 双击运行 `Setup.exe`，或解压 `portable.zip` 后运行 `FileTools.exe`
            3. Linux: `sudo dpkg -i *.deb`，或解压 tar.gz 后运行 `./FileTools`
            4. 启动后浏览器自动打开 `http://127.0.0.1:8000`

  # ==================== 版本号自动提交 ====================
  version-bump:
    name: Bump Version (if needed)
    needs: [build]
    if: github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        run: |
          CURRENT_VERSION=$(cat VERSION 2>/dev/null || echo "1.0.0")
          MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
          MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
          PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          APP_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

          echo "${APP_VERSION}" > VERSION

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add VERSION
          git commit -m "chore: bump version to ${APP_VERSION} [skip ci]" || echo "No changes to commit"

      - name: Push changes
        run: |
          git push || echo "Push failed - may need manual intervention"
