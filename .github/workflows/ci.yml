name: CI/CD

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - cpu
          - gpu
          - slim

env:
  PYTHONUNBUFFERED: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ==================== 代码质量检查 ====================
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black basedpyright bandit

      - name: Lint with ruff
        run: |
          ruff check backend/ tests/ --output-format=github
        continue-on-error: false

      - name: Format check with black
        run: |
          black --check backend/ tests/
        continue-on-error: false

      - name: Type check with basedpyright
        run: |
          basedpyright backend/ tests/
        continue-on-error: false

  # ==================== 单元测试 ====================
  test:
    name: Unit Tests (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/unit/ -v --cov=backend --cov-report=xml --cov-report=term --tb=short

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  # ==================== 冒烟测试 ====================
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "."

      - name: Smoke test
        run: |
          # Start server in background with mocked native libs (CI runners lack AVX-512)
          python -c "
          import sys
          from unittest.mock import MagicMock
          sys.modules['tantivy'] = MagicMock()
          sys.modules['hnswlib'] = MagicMock()
          import uvicorn
          uvicorn.run('backend.api.main:app', host='127.0.0.1', port=8000)
          " &
          APP_PID=$!
          trap "kill $APP_PID 2>/dev/null" EXIT

          echo "Waiting for server to start..."
          for i in $(seq 1 120); do
            if curl -s http://127.0.0.1:8000/api/health/ready > /dev/null 2>&1; then
              echo "Server is ready after ${i}s"
              break
            fi
            sleep 1
          done

          # Health check
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/api/health)
          echo "Health endpoint returned HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Health check failed (HTTP $HTTP_CODE)"
            curl -s http://127.0.0.1:8000/api/health
            exit 1
          fi
          echo "Health check passed"

          # Search endpoint test
          HTTP_CODE=$(curl -s -o /tmp/search_result.json -w "%{http_code}" -X POST http://127.0.0.1:8000/api/search \
            -H "Content-Type: application/json" \
            -d '{"query":"test"}')
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "Search endpoint OK (HTTP 200)"
          else
            echo "Search endpoint returned HTTP $HTTP_CODE"
          fi

  # ==================== 安全检查 ====================
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install bandit safety

      - name: Run Bandit security checks
        run: |
          bandit -r backend/ -ll || true

      - name: Run safety check
        run: |
          safety check --json || true

  # ==================== 打包构建 ====================
  build:
    name: Build ${{ matrix.build_mode }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows: 构建所有版本
          - os: windows-latest
            build_mode: cpu
            deps: "ai-cpu"
          - os: windows-latest
            build_mode: gpu
            deps: "ai-gpu"
          - os: windows-latest
            build_mode: slim
            deps: ""
          # Linux: 仅构建 slim 版本（AI 版本超过 2GB GitHub 限制）
          # Linux cpu/gpu 使用 pip install 或 Docker 分发
          - os: ubuntu-latest
            build_mode: slim
            deps: ""

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e ".[dev]"
          DEPS="${{ matrix.deps }}"
          if [ -n "$DEPS" ]; then
            pip install -e ".[${DEPS}]"
          fi

      - name: Resolve build version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            APP_VERSION="${GITHUB_REF_NAME#v}"
            echo "Using tag version: ${APP_VERSION}"
          else
            CURRENT_VERSION=$(cat VERSION 2>/dev/null || echo "1.0.0")
            echo "Using version: ${CURRENT_VERSION}"
            APP_VERSION="${CURRENT_VERSION}"
          fi
          echo "FILETOOLS_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"
          echo "FILETOOLS_BUILD_MODE=${{ matrix.build_mode }}" >> "$GITHUB_ENV"

      - name: Build executable (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          export FILETOOLS_VERSION="$FILETOOLS_VERSION"
          export FILETOOLS_BUILD_MODE="$FILETOOLS_BUILD_MODE"
          pyinstaller file-tools.spec --noconfirm --clean

      - name: Build executable (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          export FILETOOLS_VERSION=${FILETOOLS_VERSION}
          export FILETOOLS_BUILD_MODE=${FILETOOLS_BUILD_MODE}
          pyinstaller file-tools.spec --noconfirm --clean

      - name: Clean up build output
        shell: bash
        run: |
          # Remove any .py source files that may have been included
          find dist -name "*.py" -type f -delete 2>/dev/null || true
          # Remove __pycache__ directories
          find dist -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          echo "Build output cleaned"

      - name: Verify build output (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          ARCHIVE_DIR="filetools_${FILETOOLS_VERSION}_${{ matrix.build_mode }}"
          if [ -f "dist/${ARCHIVE_DIR}/FileTools.exe" ] || [ -f "dist/${ARCHIVE_DIR}/filetools.exe" ]; then
            echo "FileTools.exe found"
          else
            echo "ERROR: FileTools.exe not found"
            ls -la "dist/${ARCHIVE_DIR}/" 2>/dev/null || echo "Directory not found"
            exit 1
          fi
          # Check python311.dll exists
          if [ -f "dist/${ARCHIVE_DIR}/FileTools.exe" ]; then
            echo "Build output OK"
          fi

      - name: Verify build output (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          ARCHIVE_DIR="filetools_${FILETOOLS_VERSION}_${{ matrix.build_mode }}"
          if [ -f "dist/${ARCHIVE_DIR}/FileTools" ] || [ -f "dist/${ARCHIVE_DIR}/filetools" ]; then
            echo "FileTools binary found"
            [ -f "dist/${ARCHIVE_DIR}/FileTools" ] && chmod +x "dist/${ARCHIVE_DIR}/FileTools"
            [ -f "dist/${ARCHIVE_DIR}/filetools" ] && chmod +x "dist/${ARCHIVE_DIR}/filetools"
            echo "Build output OK"
          else
            echo "ERROR: FileTools binary not found"
            ls -la "dist/${ARCHIVE_DIR}/" 2>/dev/null || echo "Directory not found"
            exit 1
          fi

      - name: Install NSIS (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          # Download NSIS directly (more reliable than Chocolatey)
          NSIS_URL="https://downloads.sourceforge.net/project/nsis/NSIS%203/3.11/nsis-3.11.zip"
          curl -L -o nsis.zip "$NSIS_URL"
          unzip -q nsis.zip -d "${{ runner.temp }}/nsis"
          echo "${{ runner.temp }}/nsis/nsis-3.11" >> $GITHUB_PATH

      - name: Create NSIS installer (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          FILETOOLS_VERSION: ${{ env.FILETOOLS_VERSION }}
          FILETOOLS_BUILD_MODE: ${{ env.FILETOOLS_BUILD_MODE }}
        run: |
          # Generate NSIS script and build installer
          python scripts/build_installer.py \
            --mode "${{ matrix.build_mode }}" \
            --version "${FILETOOLS_VERSION}"

      - name: Create portable zip (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          FILETOOLS_VERSION: ${{ env.FILETOOLS_VERSION }}
          FILETOOLS_BUILD_MODE: ${{ env.FILETOOLS_BUILD_MODE }}
        run: |
          ARCHIVE_DIR="filetools_${FILETOOLS_VERSION}_${{ matrix.build_mode }}"
          PACKAGE_NAME="filetools_${FILETOOLS_VERSION}_${{ matrix.build_mode }}_windows_amd64_portable.zip"
          7z a "dist/${PACKAGE_NAME}" "dist/${ARCHIVE_DIR}"
          echo "Created: dist/${PACKAGE_NAME}"

      - name: Create .deb package (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          FILETOOLS_VERSION: ${{ env.FILETOOLS_VERSION }}
          FILETOOLS_BUILD_MODE: ${{ env.FILETOOLS_BUILD_MODE }}
        run: |
          set -e
          ARCHIVE_DIR="filetools_${FILETOOLS_VERSION}_${{ matrix.build_mode }}"
          DEB_PKG="filetools_${FILETOOLS_VERSION}_${{ matrix.build_mode }}_linux_amd64.deb"

          echo "Checking build directory: dist/${ARCHIVE_DIR}"
          ls -lah "dist/${ARCHIVE_DIR}" 2>/dev/null || { echo "ERROR: Build directory not found"; exit 1; }

          PKG_ROOT="debbuild/${DEB_PKG}"
          mkdir -p "${PKG_ROOT}/DEBIAN"
          mkdir -p "${PKG_ROOT}/opt/filetools"
          mkdir -p "${PKG_ROOT}/usr/share/applications"
          mkdir -p "${PKG_ROOT}/usr/local/bin"

          # Copy build output
          cp -r "dist/${ARCHIVE_DIR}/"* "${PKG_ROOT}/opt/filetools/"

          # Control file (no leading spaces - dpkg requires it)
          printf '%s\n' \
            "Package: filetools-${{ matrix.build_mode }}" \
            "Version: ${FILETOOLS_VERSION}" \
            "Architecture: amd64" \
            "Maintainer: Darian <dry-u@users.noreply.github.com>" \
            "Description: FileTools (${{ matrix.build_mode }} edition) - Intelligent file search and RAG system" \
            " A hybrid file retrieval and RAG system with dual-engine search," \
            " supporting text (BM25) and vector (HNSW) search." \
            "Section: utils" \
            "Priority: optional" \
            > "${PKG_ROOT}/DEBIAN/control"

          # Post-install script
          printf '%s\n' \
            '#!/bin/bash' \
            'chmod +x /opt/filetools/FileTools' \
            'ln -sf /opt/filetools/FileTools /usr/local/bin/filetools 2>/dev/null || true' \
            > "${PKG_ROOT}/DEBIAN/postinst"
          chmod 755 "${PKG_ROOT}/DEBIAN/postinst"

          # Pre-remove script
          printf '%s\n' \
            '#!/bin/bash' \
            'rm -f /usr/local/bin/filetools 2>/dev/null || true' \
            > "${PKG_ROOT}/DEBIAN/prerm"
          chmod 755 "${PKG_ROOT}/DEBIAN/prerm"

          # Desktop entry
          printf '%s\n' \
            '[Desktop Entry]' \
            'Name=FileTools' \
            'Comment=Intelligent file search and RAG system' \
            'Exec=/opt/filetools/FileTools' \
            'Icon=filetools' \
            'Terminal=false' \
            'Type=Application' \
            'Categories=Utility;FileTools;' \
            > "${PKG_ROOT}/usr/share/applications/filetools.desktop"

          # Build .deb
          dpkg-deb --build --root-owner-group "${PKG_ROOT}" || { echo "ERROR: dpkg-deb failed"; exit 1; }
          mv "debbuild/${DEB_PKG}" "dist/${DEB_PKG}" || { echo "ERROR: mv failed"; exit 1; }
          # Clean up intermediate deb build directory
          rm -rf debbuild
          echo "Created: dist/${DEB_PKG}"
          # Verify deb file exists
          ls -la dist/*.deb

      - name: Create tar.gz archive (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          FILETOOLS_VERSION: ${{ env.FILETOOLS_VERSION }}
          FILETOOLS_BUILD_MODE: ${{ env.FILETOOLS_BUILD_MODE }}
        run: |
          ARCHIVE_DIR="filetools_${FILETOOLS_VERSION}_${{ matrix.build_mode }}"
          PACKAGE_NAME="filetools_${FILETOOLS_VERSION}_${{ matrix.build_mode }}_linux_amd64_portable.tar.gz"
          tar -czf "dist/${PACKAGE_NAME}" -C dist "${ARCHIVE_DIR}"
          echo "Created: dist/${PACKAGE_NAME}"

      - name: Clean up PyInstaller build directories
        shell: bash
        run: |
          # Remove PyInstaller build directory
          rm -rf build/
          # Remove unpacked application directory (keep only final packages)
          rm -rf dist/FileTools-v*/
          rm -rf dist/filetools_*/
          # Remove generated NSIS scripts
          rm -f installer-*.nsi
          echo "Cleaned up build intermediates"
          ls -la dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: file-tools-${{ matrix.build_mode }}-${{ matrix.os }}-v${{ env.FILETOOLS_VERSION }}
          path: |
            dist/*_setup.exe
            dist/*_portable.zip
            dist/*_portable.tar.gz
            dist/*.deb
          if-no-files-found: warn
          retention-days: 30

  # ==================== 发布 ====================
  release:
    name: Publish Release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Display structure of downloaded files
        run: |
          ls -R release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Only match final packages, not intermediate build files
          files: |
            release-artifacts/**/*_setup.exe
            release-artifacts/**/*_portable.zip
            release-artifacts/**/*.deb
            release-artifacts/**/*_portable.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## FileTools ${{ github.ref_name }}

            ### 更新日志
            查看完整变更日志: https://github.com/${{ github.repository }}/compare/v1.0.10...${{ github.ref_name }}

            ### 版本说明

            | 版本 | 说明 | 体积 | 适用场景 |
            |------|------|------|----------|
            | **Slim** | 文件搜索，无 AI | ~100 MB | 轻量使用，仅需搜索功能 |
            | **CPU** | 完整 AI，CPU 推理 | ~260 MB | 无 GPU 电脑，需要 AI 问答 |
            | **GPU** | 完整 AI，CUDA 加速 | ~260 MB | NVIDIA 显卡，需要 GPU 加速 |

            ### 下载说明

            #### 📦 命名规则
            ```
            filetools_{版本号}_{模式}_{平台}_{架构}_{类型}.{扩展名}
            ```
            - **版本号**: 如 1.1.0
            - **模式**: slim / cpu / gpu
            - **平台**: windows / linux
            - **架构**: amd64 (64位)
            - **类型**: setup (安装程序) / portable (便携版)

            #### 🪟 Windows (x64, 64位)
            | 文件名 | 大小 | 类型 | 说明 |
            |--------|------|------|------|
            | `filetools_1.1.0_slim_windows_amd64_setup.exe` | ~100 MB | 安装程序 | 推荐：自动安装，带卸载 |
            | `filetools_1.1.0_cpu_windows_amd64_setup.exe` | ~260 MB | 安装程序 | AI 功能，纯 CPU |
            | `filetools_1.1.0_gpu_windows_amd64_setup.exe` | ~260 MB | 安装程序 | AI 功能，CUDA 加速 |
            | `filetools_1.1.0_*_windows_amd64_portable.zip` | 同左 | 便携版 | 解压即用，不写注册表 |

            - **安装版**：安装到 `C:\Program Files\FileTools\`，创建快捷方式
            - **便携版**：解压到任意位置，双击 `FileTools.exe` 运行

            #### 🐧 Linux (x64, 64位, Ubuntu/Debian)
            > **注意**：Linux AI 版本（cpu/gpu）体积超过 GitHub 2GB 限制，请使用以下方式安装：

            **方式 1: pip 安装（推荐）**
            ```bash
            pip install filetools[ai-cpu]   # CPU 版本
            pip install filetools[ai-gpu]   # GPU 版本
            filetools  # 启动
            ```

            **方式 2: Docker**
            ```bash
            docker run -p 8000:8000 filetools:cpu
            ```

            **方式 3: 仅文件搜索（Release 下载）**
            | 文件名 | 大小 | 说明 |
            |--------|------|------|
            | `filetools_1.1.0_slim_linux_amd64_portable.tar.gz` | ~128 MB | 便携版，解压即用 |
            | `filetools_1.1.0_slim_linux_amd64.deb` | ~128 MB | 安装包，`sudo dpkg -i` |

            ### 快速开始

            **Windows**
            1. 下载对应版本的 `*_setup.exe` 或 `*_portable.zip`
            2. 运行安装程序或解压后双击 `FileTools.exe`
            3. 浏览器自动打开 http://127.0.0.1:8000

            **Linux**
            ```bash
            # 方式 1: pip 安装 AI 版本
            pip install filetools[ai-cpu]
            filetools

            # 方式 2: 下载 slim 便携版
            tar -xzf filetools_1.1.0_slim_linux_amd64_portable.tar.gz
            cd filetools_1.1.0_slim_linux_amd64/
            ./FileTools
            ```

            ### 系统要求
            - **Windows**: Windows 10/11 64位
            - **Linux**: Ubuntu 20.04+ / Debian 11+ (64位)
            - **GPU 版本**: NVIDIA 显卡 + CUDA 驱动 11.8+
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==================== 版本号自动提交 ====================
  version-bump:
    name: Bump Version (if needed)
    needs: [build]
    if: github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        run: |
          CURRENT_VERSION=$(cat VERSION 2>/dev/null || echo "1.0.0")
          MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
          MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
          PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          APP_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

          echo "${APP_VERSION}" > VERSION

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add VERSION
          git commit -m "chore: bump version to ${APP_VERSION} [skip ci]" || echo "No changes to commit"

      - name: Push changes
        run: |
          git push || echo "Push failed - may need manual intervention"
