name: CI/CD (PyInstaller + Tauri)

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - debug
          - release

env:
  PYTHONUNBUFFERED: 1
  UV_SYSTEM_PYTHON: 1
  # Use default PyPI in CI (override pyproject.toml's Chinese mirror)
  UV_INDEX_URL: https://pypi.org/simple/

jobs:
  # ==================== 代码质量检查 ====================
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Lint with ruff
        run: |
          uvx ruff check backend/ tests/ --output-format=github
        continue-on-error: false

      - name: Format check with ruff
        run: |
          uvx ruff format --check backend/ tests/
        continue-on-error: false

      - name: Type check with mypy
        run: |
          uvx mypy backend/ --ignore-missing-imports --pretty
        continue-on-error: true

  # ==================== 单元测试 ====================
  test:
    name: Unit Tests (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Run tests with coverage
        run: |
          uv run pytest tests/unit/ -v --cov=backend --cov-report=xml --cov-report=term --tb=short

      - name: Run integration tests
        run: |
          uv run pytest tests/integration/ -v --tb=short

      - name: Run API tests
        run: |
          uv run pytest tests/api/ -v --tb=short

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  # ==================== macOS 测试 ====================
  test-macos:
    name: Unit Tests (Python ${{ matrix.python-version }} on macOS)
    runs-on: macos-14
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: |
          uv sync --index-url https://pypi.org/simple/

      - name: Run unit tests with coverage
        run: |
          uv run pytest tests/unit/ -v --cov=backend --cov-report=xml --cov-report=term --tb=short

      - name: Run integration tests
        run: |
          uv run pytest tests/integration/ -v --tb=short

      - name: Run API tests
        run: |
          uv run pytest tests/api/ -v --tb=short

  # ==================== 安全检查 ====================
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Run Bandit security checks
        run: |
          uvx bandit -r backend/ -ll

      - name: Run safety check
        run: |
          uvx safety check --json

  # ==================== Tauri 构建 (Windows) ====================
  build-tauri-windows:
    name: Build Tauri (Windows)
    runs-on: windows-latest
    timeout-minutes: 180
    needs: [lint, test, test-macos]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'
          shared-key: 'tauri-windows'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: |
          uv sync --index-url https://pypi.org/simple/

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Tauri CLI
        run: |
          npm install -g @tauri-apps/cli@latest

      - name: Resolve version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            APP_VERSION="${GITHUB_REF_NAME#v}"
          else
            APP_VERSION=$(cat VERSION 2>/dev/null || echo "1.0.0")
          fi
          echo "FILETOOLS_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"
          echo "App version: ${APP_VERSION}"

      - name: Sync version to all config files
        run: node scripts/sync-version.js
        env:
          FILETOOLS_VERSION: ${{ env.FILETOOLS_VERSION }}

      - name: Verify version consistency
        run: node scripts/verify-version.js
        env:
          FILETOOLS_VERSION: ${{ env.FILETOOLS_VERSION }}

      - name: Build Python backend with PyInstaller
        run: |
          uv run python build_pyinstaller.py
        env:
          FILETOOLS_VERSION: ${{ env.FILETOOLS_VERSION }}

      - name: Verify backend binary
        shell: bash
        run: |
          if [ -f "src-tauri/bin/filetools_backend-x86_64-pc-windows-msvc.exe" ]; then
            echo "Backend binary found"
            ls -la src-tauri/bin/
          else
            echo "ERROR: Backend binary not found"
            ls -la src-tauri/bin/ || echo "bin directory not found"
            exit 1
          fi

      - name: Build Tauri application
        run: |
          $env:PATH = 'C:\Users\20840\.cargo\bin;' + $env:PATH
          npm run tauri:build -- --bundles nsis,msi
        env:
          FILETOOLS_VERSION: ${{ env.FILETOOLS_VERSION }}
          # Windows 代码签名（需要先在 GitHub Secrets 中配置）
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Display build artifacts
        run: |
          echo "=== Build artifacts ==="
          Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -File | ForEach-Object {
            Write-Host "$($_.Directory.Name)/$($_.Name) - $([math]::Round($_.Length / 1MB, 2)) MB"
          }

      - name: Upload Windows installers
        uses: actions/upload-artifact@v7
        with:
          name: filetools-windows-installers-v${{ env.FILETOOLS_VERSION }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn
          retention-days: 30

      - name: Prepare portable artifact directory
        shell: bash
        run: |
          mkdir -p release-portable
          cp src-tauri/target/release/filetools.exe release-portable/
          cp src-tauri/bin/filetools_backend.exe release-portable/ 2>/dev/null || \
            cp src-tauri/bin/filetools_backend-x86_64-pc-windows-msvc.exe release-portable/filetools_backend.exe
          ls -la release-portable/

      - name: Upload portable components
        uses: actions/upload-artifact@v7
        with:
          name: filetools-windows-portable-v${{ env.FILETOOLS_VERSION }}
          path: release-portable/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: windows-build-logs
          path: |
            src-tauri/target/release/build/
            data/logs/
          retention-days: 7

  # ==================== Tauri 构建 (Linux) ====================
  build-tauri-linux:
    name: Build Tauri (Linux)
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    needs: [lint, test, test-macos]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'
          shared-key: 'tauri-linux'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            python3-venv

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: |
          uv sync --index-url https://pypi.org/simple/

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Tauri CLI
        run: |
          npm install -g @tauri-apps/cli@latest

      - name: Resolve version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            APP_VERSION="${GITHUB_REF_NAME#v}"
          else
            APP_VERSION=$(cat VERSION 2>/dev/null || echo "1.0.0")
          fi
          echo "FILETOOLS_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"

      - name: Sync version to all config files
        run: node scripts/sync-version.js
        env:
          FILETOOLS_VERSION: ${{ env.FILETOOLS_VERSION }}

      - name: Verify version consistency
        run: node scripts/verify-version.js
        env:
          FILETOOLS_VERSION: ${{ env.FILETOOLS_VERSION }}

      - name: Build Python backend with PyInstaller
        run: |
          uv run python build_pyinstaller.py

      - name: Build Tauri application
        run: |
          npm run tauri:build -- --bundles deb,appimage
        env:
          FILETOOLS_VERSION: ${{ env.FILETOOLS_VERSION }}

      - name: Display build artifacts
        run: |
          echo "=== Build artifacts ==="
          find src-tauri/target/release/bundle -type f -name "*.deb" -o -name "*.AppImage" | while read f; do
            echo "$f - $(du -h "$f" | cut -f1)"
          done

      - name: Upload Linux installers
        uses: actions/upload-artifact@v7
        with:
          name: filetools-linux-installers-v${{ env.FILETOOLS_VERSION }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: linux-build-logs
          path: |
            src-tauri/target/release/build/
            data/logs/
          retention-days: 7

  # ==================== Tauri 构建 (macOS ARM64) ====================
  build-tauri-macos-arm64:
    name: Build Tauri (macOS ARM64)
    runs-on: macos-14
    timeout-minutes: 180
    needs: [lint, test, test-macos]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'
          shared-key: 'tauri-macos-arm64'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: |
          uv sync --index-url https://pypi.org/simple/

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Tauri CLI
        run: |
          npm install -g @tauri-apps/cli@latest

      - name: Resolve version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            APP_VERSION="${GITHUB_REF_NAME#v}"
          else
            APP_VERSION=$(cat VERSION 2>/dev/null || echo "1.0.0")
          fi
          echo "FILETOOLS_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"

      - name: Sync version to all config files
        run: node scripts/sync-version.js
        env:
          FILETOOLS_VERSION: ${{ env.FILETOOLS_VERSION }}

      - name: Verify version consistency
        run: node scripts/verify-version.js
        env:
          FILETOOLS_VERSION: ${{ env.FILETOOLS_VERSION }}

      - name: Build Python backend with PyInstaller
        run: |
          uv run python build_pyinstaller.py

      - name: Build Tauri application
        run: |
          npm run tauri:build -- --bundles dmg --target aarch64-apple-darwin
        env:
          FILETOOLS_VERSION: ${{ env.FILETOOLS_VERSION }}
          # macOS 代码签名（需要先在 GitHub Secrets 中配置）
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload macOS ARM64 installer
        uses: actions/upload-artifact@v7
        with:
          name: filetools-macos-arm64-dmg-v${{ env.FILETOOLS_VERSION }}
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: macos-arm64-build-logs
          path: |
            src-tauri/target/aarch64-apple-darwin/release/build/
            data/logs/
          retention-days: 7

  # ==================== E2E 测试 (Windows) ====================
  e2e-windows:
    name: E2E Tests (Windows)
    runs-on: windows-latest
    timeout-minutes: 30
    needs: [build-tauri-windows]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            APP_VERSION="${GITHUB_REF_NAME#v}"
          else
            APP_VERSION=$(cat VERSION 2>/dev/null || echo "1.0.0")
          fi
          echo "FILETOOLS_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"
          echo "App version: ${APP_VERSION}"

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: filetools-windows-portable-v${{ env.FILETOOLS_VERSION }}
          path: ./build

      - name: Display downloaded artifacts
        run: |
          Get-ChildItem -Path "./build" -Recurse -File | ForEach-Object {
            Write-Host "$($_.Name) - $([math]::Round($_.Length / 1MB, 2)) MB"
          }

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: |
          uv sync --index-url https://pypi.org/simple/

      - name: Install Playwright browsers
        run: |
          uv run playwright install chromium --with-deps

      - name: Run E2E tests
        run: |
          # Start the backend sidecar directly for API testing
          $backendPath = "./build/filetools_backend.exe"
          if (Test-Path $backendPath) {
            Start-Process -FilePath $backendPath -WindowStyle Hidden
            Write-Host "Started backend: $backendPath"
          } else {
            # Fallback: extract and start from the main exe
            Write-Host "Backend not found as separate file, using main app"
            Start-Process -FilePath "./build/filetools.exe" -WindowStyle Hidden
          }

          # Wait for app to be ready (smart polling)
          $maxWait = 30
          $ready = $false
          for ($i = 0; $i -lt $maxWait; $i++) {
            try {
              $response = Invoke-WebRequest -Uri "http://127.0.0.1:18642/api/health" -UseBasicParsing -TimeoutSec 2 -ErrorAction SilentlyContinue
              if ($response.StatusCode -eq 200) {
                Write-Host "App is ready after $i seconds"
                $ready = $true
                break
              }
            } catch {}
            Start-Sleep -Milliseconds 500
          }
          if (-not $ready) {
            Write-Host "Warning: App may not be fully ready after $maxWait seconds"
          }

          # Run E2E tests
          uv run pytest tests/e2e/ -v --tb=short

          # Cleanup
          Get-Process -Name "filetools*" -ErrorAction SilentlyContinue | Stop-Process -Force
          Get-Process -Name "filetools_backend*" -ErrorAction SilentlyContinue | Stop-Process -Force

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: windows-e2e-failure-artifacts
          path: |
            test-results/
            data/logs/
          retention-days: 7

  # ==================== E2E 测试 (Linux) ====================
  e2e-linux:
    name: E2E Tests (Linux)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: [build-tauri-linux]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            APP_VERSION="${GITHUB_REF_NAME#v}"
          else
            APP_VERSION=$(cat VERSION 2>/dev/null || echo "1.0.0")
          fi
          echo "FILETOOLS_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"
          echo "App version: ${APP_VERSION}"

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: filetools-linux-installers-v${{ env.FILETOOLS_VERSION }}
          path: ./build

      - name: Display downloaded artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          ls -la ./build/
          find ./build -type f \( -name "*.AppImage" -o -name "*.appimage" \) | head -5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 xvfb

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: |
          uv sync --index-url https://pypi.org/simple/

      - name: Install Playwright browsers
        run: |
          uv run playwright install chromium --with-deps

      - name: Run E2E tests
        run: |
          # 查找并运行 AppImage
          APPIMAGE_PATH=$(find ./build -name "*.AppImage" -o -name "*.appimage" | head -1)
          if [ -z "$APPIMAGE_PATH" ]; then
            echo "ERROR: No AppImage found in ./build/"
            ls -la ./build/
            exit 1
          fi
          echo "Found AppImage: $APPIMAGE_PATH"
          chmod +x "$APPIMAGE_PATH"

          # 使用 xvfb-run 在虚拟显示中运行
          xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" "$APPIMAGE_PATH" --appimage-extract-and-run &
          APP_PID=$!

          # Wait for app to be ready (smart polling)
          max_wait=30
          ready=false
          for i in $(seq 1 $max_wait); do
            if curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:18642/api/health 2>/dev/null | grep -q "200"; then
              echo "App is ready after $i seconds"
              ready=true
              break
            fi
            sleep 0.5
          done
          if [ "$ready" = false ]; then
            echo "Warning: App may not be fully ready after $max_wait seconds"
          fi

          # 运行 E2E 测试
          uv run pytest tests/e2e/ -v --tb=short

          # Cleanup
          kill $APP_PID 2>/dev/null || true

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: linux-e2e-failure-artifacts
          path: |
            test-results/
            data/logs/
          retention-days: 7

  # ==================== E2E 测试 (macOS) ====================
  e2e-macos:
    name: E2E Tests (macOS)
    runs-on: macos-14
    timeout-minutes: 30
    needs: [build-tauri-macos-arm64]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            APP_VERSION="${GITHUB_REF_NAME#v}"
          else
            APP_VERSION=$(cat VERSION 2>/dev/null || echo "1.0.0")
          fi
          echo "FILETOOLS_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"
          echo "App version: ${APP_VERSION}"

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: filetools-macos-arm64-dmg-v${{ env.FILETOOLS_VERSION }}
          path: ./build

      - name: Display downloaded artifacts
        run: |
          ls -la ./build/

      - name: Mount DMG and extract app
        run: |
          hdiutil attach ./build/*.dmg -mountpoint /Volumes/test || true
          ls -la /Volumes/test/
          # Verify app bundle exists and copy to local
          if [ -d "/Volumes/test/FileTools.app" ]; then
            echo "App bundle found"
            echo "App size: $(du -sh /Volumes/test/FileTools.app | cut -f1)"
            cp -R /Volumes/test/FileTools.app ./FileTools.app
            hdiutil detach /Volumes/test || true
          else
            echo "ERROR: App bundle not found"
            exit 1
          fi
          ls -la ./FileTools.app/
          ls -la ./FileTools.app/Contents/MacOS/ || echo "MacOS dir not found"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: |
          uv sync --index-url https://pypi.org/simple/

      - name: Install Playwright browsers
        run: |
          uv run playwright install chromium --with-deps

      - name: Run E2E tests
        run: |
          # 启动应用 - 直接使用二进制而不是 open 命令
          APP_BINARY="./FileTools.app/Contents/MacOS/filetools"
          if [ -f "$APP_BINARY" ]; then
            echo "Starting app binary: $APP_BINARY"
            "$APP_BINARY" &
            APP_PID=$!
            echo "App PID: $APP_PID"
          else
            echo "Binary not found at $APP_BINARY, trying Contents/MacOS/"
            ls -la ./FileTools.app/Contents/MacOS/ || true
            # Fallback to open command
            open ./FileTools.app
          fi

          # Wait for app to be ready (smart polling)
          max_wait=60
          ready=false
          for i in $(seq 1 $max_wait); do
            if curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:18642/api/health 2>/dev/null | grep -q "200"; then
              echo "App is ready after $i seconds"
              ready=true
              break
            fi
            if [ $((i % 10)) -eq 0 ]; then
              echo "Waiting for app... ($i seconds)"
            fi
            sleep 0.5
          done
          if [ "$ready" = false ]; then
            echo "Warning: App may not be fully ready after $max_wait seconds"
          fi

          # 运行 E2E 测试
          uv run pytest tests/e2e/ -v --tb=short

      - name: Cleanup
        if: always()
        run: |
          pkill -f filetools || true
          pkill -f FileTools || true

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: macos-e2e-failure-artifacts
          path: |
            test-results/
            data/logs/
          retention-days: 7

  # ==================== 发布 ====================
  release:
    name: Publish Release
    needs: [build-tauri-windows, build-tauri-linux, build-tauri-macos-arm64]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          APP_VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${APP_VERSION}" >> $GITHUB_OUTPUT
          echo "App version: ${APP_VERSION}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Display artifacts
        run: |
          echo "=== Original artifacts ==="
          find release-artifacts -type f | while read f; do
            echo "$f - $(du -h "$f" | cut -f1)"
          done

      - name: Rename and package artifacts
        run: node scripts/package-release.js
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ARTIFACTS_DIR: release-artifacts
          OUTPUT_DIR: release-files

      - name: Generate Release Notes
        id: release-notes
        run: node scripts/generate-release-notes.js
        env:
          VERSION: ${{ steps.version.outputs.version }}
          CHANGELOG_PATH: CHANGELOG.md
          OUTPUT_PATH: release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          draft: true
          prerelease: false
          body_path: release-body.md
          name: "FileTools v${{ steps.version.outputs.version }}"
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
