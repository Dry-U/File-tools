name: Release Drafter

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-release-draft:
    name: Update Release Draft
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Draft Release
        uses: release-drafter/release-drafter@v6
        with:
          config-name: release-drafter.yml
          # 从上一个正式 tag 开始（跳过 v 前缀的预发布 tag）
          previous-tag-name: $(git describe --tags --abbrev=0 2>/dev/null || echo "")
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
